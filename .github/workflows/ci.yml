name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: knowledge_elicitation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d knowledge_elicitation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://app:testpassword@localhost:5432/knowledge_elicitation
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create test database
        run: PGPASSWORD=testpassword psql -h localhost -U app -d knowledge_elicitation -c "CREATE DATABASE knowledge_elicitation_test;"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -xvs

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check and build
        working-directory: frontend
        run: npm run build

  markdown-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Get changed markdown files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: '**/*.md'

      - name: Check links
        if: steps.changed.outputs.any_changed == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--no-progress docs/*.md README.md AGENTS.md'
          fail: true

      - name: Setup Node.js
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Mermaid diagrams
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          npm install -g @mermaid-js/mermaid-cli
          ./scripts/validate-mermaid.sh ${{ steps.changed.outputs.all_changed_files }}

  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run infrastructure config tests
        run: uv run --with pytest --with pyyaml pytest tests/test_embedding_infra.py -xvs

  embedding-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache embedding model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/bge-m3-q8_0.gguf
          key: embedding-model-bge-m3-q8_0

      - name: Download embedding model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --progress-bar \
            -o models/bge-m3-q8_0.gguf \
            "https://huggingface.co/ggml-org/bge-m3-Q8_0-GGUF/resolve/main/bge-m3-q8_0.gguf"

      - name: Start embedding service
        run: docker compose --profile embedding up -d embedding
        env:
          EMBEDDING_MODEL_DIR: ./models

      - name: Wait for embedding service to be healthy
        run: |
          echo "Waiting for embedding service..."
          timeout 120 bash -c 'until curl -sf http://localhost:8090/health; do sleep 3; done'
          echo "Embedding service is healthy"

      - name: Run integration tests
        run: uv run --with pytest --with httpx pytest tests/test_embedding_integration.py -xvs

      - name: Stop services
        if: always()
        run: docker compose --profile embedding down

  backup-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Start db and backup services
        run: docker compose --profile backup up -d db backup

      - name: Wait for db healthy
        run: timeout 60 bash -c 'until docker compose exec db pg_isready -U app; do sleep 2; done'

      - name: Start api to run migrations
        run: |
          docker compose up -d api
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: Trigger daily backup
        run: docker compose exec backup /scripts/backup.sh /backups

      - name: Trigger weekly backup (simulate Sunday)
        run: docker compose exec -e DAY_OF_WEEK=7 backup /scripts/backup.sh /backups

      - name: Verify backup files on host
        run: |
          echo "--- Daily backups ---"
          ls -l ./backups/backup_*.sql.gz
          echo "--- Weekly backups ---"
          ls -l ./backups/weekly_*.sql.gz
          echo "--- WAL directory ---"
          ls -d ./backups/wal/

      - name: Verify backup is restorable
        run: docker compose exec backup /scripts/verify.sh /backups

      - name: Tear down with -v and verify backups survive
        run: |
          docker compose --profile backup down -v
          echo "Checking backup files survive volume removal..."
          ls ./backups/backup_*.sql.gz
          ls ./backups/weekly_*.sql.gz

      - name: Dump logs on failure
        if: failure()
        run: docker compose --profile backup logs --tail=50 2>/dev/null || true

  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start services
        run: docker compose up -d db api web
        env:
          DEV_LOGIN_ENABLED: "true"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
