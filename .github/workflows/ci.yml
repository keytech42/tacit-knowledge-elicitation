name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: knowledge_elicitation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d knowledge_elicitation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://app:testpassword@localhost:5432/knowledge_elicitation
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create test database
        run: PGPASSWORD=testpassword psql -h localhost -U app -d knowledge_elicitation -c "CREATE DATABASE knowledge_elicitation_test;"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -xvs

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check and build
        working-directory: frontend
        run: npm run build
