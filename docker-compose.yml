services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledge_elicitation
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d knowledge_elicitation"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${DB_PASSWORD:-devpassword}@db:5432/knowledge_elicitation
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-at-least-32b}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-true}
      CORS_ORIGINS: '["http://localhost:5173"]'
      WORKER_URL: http://worker:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      RECOMMENDATION_STRATEGY: ${RECOMMENDATION_STRATEGY:-auto}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${WEB_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  worker:
    build: ./worker
    command: uvicorn worker.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      PLATFORM_API_URL: http://api:8000
      PLATFORM_API_KEY: ${WORKER_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4-6}
      RECOMMENDATION_MODEL: ${RECOMMENDATION_MODEL:-anthropic/claude-haiku-4-5-20251001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${WORKER_HOST_PORT:-8001}:8001"
    volumes:
      - ./worker:/app
    depends_on:
      - api

volumes:
  pgdata:
