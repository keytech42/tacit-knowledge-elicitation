# PostgreSQL configuration for backup & WAL archiving
# Include via: -c 'config_file=/etc/postgresql/postgresql.conf'
# or mount as a volume into the db container.

# --- Memory ---
# Allocate 256MB for shared buffers (suitable for a dedicated container).
shared_buffers = 256MB

# --- WAL (Write-Ahead Logging) ---
# Set WAL level to 'replica' to enable continuous archiving and streaming replication.
# Required for point-in-time recovery (PITR).
wal_level = replica

# Maximum number of concurrent WAL sender processes.
# Needed for streaming replication; 3 allows a standby + backup tool + headroom.
max_wal_senders = 3

# Enable WAL archiving so completed WAL segments are copied to an archive location.
archive_mode = on

# Command to copy each completed WAL segment to the archive directory.
# %p = path to the WAL file, %f = filename only.
# The test (-f) prevents overwriting an existing archive (idempotent restarts).
archive_command = 'mkdir -p /backups/wal && test ! -f /backups/wal/%f && cp %p /backups/wal/%f'

# --- Checkpoints ---
# Time between automatic WAL checkpoints. Longer intervals reduce I/O at the cost
# of longer crash recovery times. 10 minutes is a good balance.
checkpoint_timeout = 10min

# Spread checkpoint writes over this fraction of the checkpoint interval.
# 0.9 means writes are spread over 90% of the 10-minute window, reducing I/O spikes.
checkpoint_completion_target = 0.9
